{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'website/css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-sign-in-alt"></i> Login</h1>
                <p>Acesse sua conta no Dumbanengue</p>
            </div>
            {% for message in messages %}
            <h4 style="color: rgb(185, 21, 117);"> {{message}}</h4>
             {% endfor %}
            <form id="loginForm" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" id="password" name="senha" required placeholder="Sua senha">
                    <a href="#forgotPassword" class="forgot-password" id="forgotPasswordLink">
                        <i class="fas fa-question-circle"></i> Esqueci a senha
                    </a>
                </div>

                <button type="submit" class="btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>

                <div class="auth-links">
                    <p>Não tem uma conta? <a href="{% url 'website:cadastro' %}">Cadastre-se aqui</a></p>
                </div>
            </form>

            <!-- Modal para recuperação de senha -->
            <div id="forgotPasswordModal" class="modal">
                <div class="modal-content">
                    <span class="close-modal">&times;</span>
                    <h3><i class="fas fa-key"></i> Recuperar Senha</h3>
                    <p>Digite seu e-mail para receber o link de recuperação:</p>
                    <div class="form-group">
                        <input type="email" id="recoveryEmail" placeholder="seu@email.com">
                    </div>
                    <button id="sendRecovery" class="btn-primary">
                        <i class="fas fa-paper-plane"></i> Enviar Link
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
